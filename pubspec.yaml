name: route_share
description: A Flutter app for mapping, photo sharing, route recording, and user authentication.
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^24.0.0
  firebase_auth: ^4.10.0
  firebase_database: ^10.0.0
  firebase_storage: ^11.0.0
  google_maps_flutter: ^2.5.0
  google_sign_in: ^6.1.0
  flutter_facebook_auth: ^5.0.0
  sign_in_with_apple: ^5.0.0
  image_picker: ^1.0.0
  location: ^4.4.0
  permission_handler: ^11.0.0
  geolocalization: ^0.8.0
  path_provider: ^2.1.0
  share_plus: ^6.0.0
  polyline_do: ^0.0.7
  uuid: ^4.0.0
  intl: ^0.19.0
  crypto: ^3.0.0
  email_validator: ^2.1.0
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.0.0
  riverpod: ^2.4.0
  hooks_riverpod: ^2.4.0
  flutter_hooks: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
